services:
  backend:
    build: 
      context: ../backend-api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "8000:8000"
    volumes:
      - ../backend-api:/var/www
      - backend_storage:/var/www/storage
      - backend_bootstrap_cache:/var/www/bootstrap/cache
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=capstone_internship_management
      - DB_USERNAME=root
      - DB_PASSWORD=root
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: frontend-ui
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../frontend-ui:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: capstone_internship_management
    ports:
      - "3306:3306"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin_tool
    environment:
      PMA_HOST: mysql
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

#  PHẦN NÀY BẮT BUỘC PHẢI CÓ
volumes:
  backend_storage:
  backend_bootstrap_cache: